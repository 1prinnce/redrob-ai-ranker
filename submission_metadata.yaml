ai_usage_summary: |
  Used ChatGPT, Claude, and Cursor for architecture discussion,
implementation assistance, debugging, documentation, and code review.
Final execution, artifact generation, validation, and submission
preparation were performed locally.

methodology_summary: |
  The pipeline performs candidate validation, feature generation, embedding
  generation, FAISS retrieval, ranking, score normalization, and submission
  generation. Artifacts produced include candidate_embeddings.npy,
  candidate_features.npz, candidate_meta.pkl, faiss.index, prep_manifest.json,
  and outputs/submission.csv. The submission passed the official validator.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: false
  reproduction_tested: true
